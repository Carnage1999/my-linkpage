<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <!-- Static fallbacks for non-JS crawlers; React 19 overrides at runtime -->
    <title>Wang — Link Page</title>
    <meta name="description" content="Personal link page — find all my social profiles in one place." />
    <meta name="author" content="Han-che Wang" />

    <meta property="og:title" content="Wang — Link Page" />
    <meta property="og:description" content="Personal link page — find all my social profiles in one place." />
    <meta property="og:type" content="profile" />
    <meta property="og:url" content="https://link.w1999.me/" />
    <meta property="og:image" content="https://link.w1999.me/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://link.w1999.me/og-image.png" />
    <meta property="og:locale" content="en" />

    <link rel="canonical" href="https://link.w1999.me/" />

    <!-- 初始化主題與語言（避免 FOUC） -->
    <script>
      ;(function () {
        try {
          var savedTheme = localStorage.getItem('theme')
          if (savedTheme === 'dark')
            document.documentElement.classList.add('dark')
          else if (savedTheme === 'light')
            document.documentElement.classList.remove('dark')
          else {
            var prefersDark = window.matchMedia(
              '(prefers-color-scheme: dark)'
            ).matches
            if (prefersDark) document.documentElement.classList.add('dark')
          }
          var savedLang = localStorage.getItem('i18nextLng')
          if (savedLang) document.documentElement.lang = savedLang
        } catch (err) {
          /* eslint-disable-next-line no-console */
          console.warn('Init error:', err)
        }
      })()
    </script>

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
